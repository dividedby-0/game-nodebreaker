<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>NodeBreaker</title>
    <link rel="preload" href="./css/style.css" as="style" />
    <link rel="stylesheet" href="./css/style.css" />
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"
      }
    }
    </script>
  </head>
  <body>
  <div id="loading-view" class="view">
    <div class="loading-text">Loading...</div>
  </div>
  <div id="audio-consent-view" class="view">
    <div class="consent-container">
      <div class="messages">
        <div class="consent-warning">Warning:</div>
        <div class="consent-text">This game uses audio</div>
      </div>
      <button class="consent-button">Not a problem</button>
      <button class="no-audio-button">Play without audio</button>
    </div>
  </div>
  <div id="game-view" class="view">
    <div id="game-container"></div>
    <div id="score-container">
      <div id="score"></div>
      <div id="message"></div>
      <div id="combo"></div>
      <div id="breakers"></div>
    </div>
    <button class="reset-button">
      <svg viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="23"/>
        <text x="25" y="32" text-anchor="middle" fill="#00ff00" style="font-family: 'VT323', monospace; font-size: 24px;">R</text>
      </svg>
    </button>
    <button class="music-button">
      <svg viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="23"/>
        <text x="25" y="32" class="note-icon" text-anchor="middle">♪</text>
        <line class="disabled-line" x1="10" y1="10" x2="40" y2="40" style="display: none"/>
      </svg>
    </button>
    <button class="pause-button">
      <svg viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="23"/>
        <text x="25" y="32" class="pause-icon" text-anchor="middle">❚❚</text>
      </svg>
    </button>
    <button class="leaderboard-button">
      <svg viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="23"/>
        <path d="M16 14 L16 22 C16 27 20 29 25 29 C30 29 34 27 34 22 L34 14 Z M20 29 L20 36 L30 36 L30 29" fill="none" stroke="#00ff00" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="hint-text">Drag to rotate the camera</div>
  </div>
  <div class="pause-overlay"><div class="pause-text">PAUSE</div></div>
  <div class="modal">
    <div class="modal-text"></div>
  </div>
  <div class="reset-progress-overlay">
    <div class="reset-message">Hold to reset</div>
    <div class="reset-progress">[ ]</div>
  </div>
  <div class="name-overlay">
    <div class="name-prompt">
      <div class="name-title">YOU MADE IT TO THE<br>TOP 10!<br>HOW SHALL WE<br>REMEMBER YOU?</div>
      <input class="name-input" type="text" maxlength="8" placeholder="PLAYER" autocomplete="off">
      <div class="name-buttons">
        <button class="name-save-btn">SAVE</button>
        <button class="name-skip-btn">STAY ANONYMOUS</button>
      </div>
    </div>
  </div>
  <script type="module" src="./src/index.js"></script>
  </body>
</html>
